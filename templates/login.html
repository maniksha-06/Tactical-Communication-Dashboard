<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICOMM Secure Access</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:black;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:#00ff66;
        }

        .login-box{
            width:350px;
            padding:40px;
            background:#111;
            border:2px solid #00ff66;
            border-radius:15px;
            box-shadow:0 0 25px #00ff66;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            text-shadow:0 0 15px #00ff66;
        }

        input{
            width:100%;
            padding:12px;
            margin:12px 0;
            background:black;
            border:1px solid #00ff66;
            color:#00ff66;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#00ff66;
            border:none;
            color:black;
            font-size:16px;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#00cc55;
        }

        .warning{
            margin-top:20px;
            color:red;
            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>TACTICOMM</h1>

        <form method="POST">

            <input type="text" name="officer_id" placeholder="Army Officer ID" required>

            <input type="password" name="access_key" placeholder="Tactical Access Key" required>

            <button type="submit">ACCESS SYSTEM</button>

        </form>

        <div class="warning">
            Authorized Signals Corps Personnel Only
        </div>

    </div>

</body>
</html>
